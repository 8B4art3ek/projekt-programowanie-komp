{% extends "base.html" %}

{% block title %} Kalkulator {% endblock %}

{% block content %}
    <h2>Jakie działanie chcesz wykonać?</h2>
    <form action="" method="post">
        <input type="number" name="a" placeholder="Pierwsza liczba" value="{{ a if a else ''}}">
        <select name="operator">
            <option value="+" {% if operator == '+' %}selected{% endif %}>+</option>
            <option value="-" {% if operator == '-' %}selected{% endif %}>-</option>
            <option value="*" {% if operator == '*' %}selected{% endif %}>*</option>
            <option value="/" {% if operator == '/' %}selected{% endif %}>/</option>
        </select>
        <input type="number" name="b" placeholder="Druga liczba" value="{{ b if b else '' }}">
        <button type="submit">Policz</button>
    </form>

    {% if result is not none %}
    <h3 class="result">Działanie {{a}}{{operator}}{{b}}={{ result }}</h3>
    {% endif %}

    {% if error %}
    <h3 class="error">Błąd: {{ error }}</h3>
    {% endif %}

    <div style="margin-top: 20px;">
        <a href="{{ url_for('index') }}" style="color: var(--text-muted); text-decoration: none;">&larr; Powrót</a>
    </div>
{% endblock %}
