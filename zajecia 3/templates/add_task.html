{% extends "index.html" %}
{% block title %}ToDo List - Dodawanie zadania{% endblock %}
{% block content %}
    <h2>Dodawanie zadania</h2>
    <form method="post">
        <input type="text" name="title" placeholder="Podaj tytuł" value="{{title}}">
        <button type="submit">Dodaj zadanie</button>
    </form>
    <a href="{{ url_for('list_tasks') }}">Powrót</a>
{% endblock %}
